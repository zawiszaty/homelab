- name: Install Docker and deploy media
  hosts: servers
  become: true

  vars:
    infrastructure_dir: "{{ remote_dir }}/infrastructure"
    local_compose: ../media/docker-compose.yml

  tasks:
    - name: Create media directory
      file:
        path: "{{ remote_dir }}"
        state: directory
        mode: "0755"

    - name: Install required packages
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present
        update_cache: true

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: >-
          deb [arch=amd64]
          https://download.docker.com/linux/ubuntu
          {{ ansible_lsb.codename }}
          stable
        state: present
        filename: docker

    - name: Install Docker and Docker Compose plugin
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Enable and start Docker service
      systemd:
        name: docker
        enabled: true
        state: started

    - name: Add user remote_user to docker group
      user:
        name: "{{ remote_user }}"
        groups: docker
        append: true

    - name: Deploy media stack tasks
      import_tasks: ../media/tasks.yml

    - name: Deploy infrastructure stack tasks
      import_tasks: ../infrastructure/tasks.yml


    - name: Deploy immich stack tasks
      import_tasks: ../immich/tasks.yml