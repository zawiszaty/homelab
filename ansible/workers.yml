- name: Configure workers servers
  hosts: workers
  become: true

  vars:
    infrastructure_dir: "{{ remote_dir }}/infrastructure"

  tasks:
    - name: Create media directory
      file:
        path: "{{ remote_dir }}"
        state: directory
        mode: "0755"
    - name: Create observability directory
      file:
        path: "{{ remote_dir }}/observability"
        state: directory
        mode: "0755"

    - name: Install required packages
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present
        update_cache: true

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: >-
          deb [arch=amd64]
          https://download.docker.com/linux/ubuntu
          {{ ansible_lsb.codename }}
          stable
        state: present
        filename: docker

    - name: Install Docker and Docker Compose plugin
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Enable and start Docker service
      systemd:
        name: docker
        enabled: true
        state: started

    - name: Add user remote_user to docker group
      user:
        name: "{{ remote_user }}"
        groups: docker
        append: true

    - name: Copy infrastructure docker-compose.yml
      copy:
        src: "{{ playbook_dir }}/../workers/docker-compose.yml"
        dest: "{{ remote_dir }}/observability/docker-compose.yml"
        mode: "0755"

    - name: Docker compose up -d (infrastructure)
      command: docker compose up -d --force-recreate
      args:
        chdir: "{{ remote_dir }}/observability"