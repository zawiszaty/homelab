- name: Ensure media directories exist
  file:
    path: "{{ remote_dir }}/{{ item }}"
    state: directory
    owner: "{{ remote_user }}"
    group: "{{ remote_user }}"
    mode: "0755"
  loop:
    - "infrastructure"
    - "infrastructure/nginx_proxy/data"
    - "infrastructure/nginx_proxy/letsencrypt"
    - "infrastructure/authentik/data"
    - "infrastructure/authentik/custom-templates"
    - "infrastructure/authentik/certs"
    - "infrastructure/n8n/data"

- name: Copy infrastructure docker-compose.yml
  copy:
    src: "{{ playbook_dir }}/../infrastructure/docker-compose.yml"
    dest: "{{ infrastructure_dir }}/docker-compose.yml"
    mode: "0755"

- name: Write infrastructure .env
  template:
    src: "{{ playbook_dir }}/templates/infrastructure.env.j2"
    dest: "{{ infrastructure_dir }}/.env"
    mode: "0755"

- name: Docker compose up -d (infrastructure)
  command: docker compose up -d --force-recreate
  args:
    chdir: "{{ infrastructure_dir }}"

- name: Copy whole observability directory
  copy:
    src: "{{ playbook_dir }}/../infrastructure/observability/"
    dest: "{{ infrastructure_dir }}/observability"
    mode: "0755"

- name: Remove legacy Grafana alerting rules directory
  file:
    path: "{{ infrastructure_dir }}/observability/grafana/provisioning/alerting/rules"
    state: absent

- name: Write observability .env
  template:
    src: "{{ playbook_dir }}/templates/observability.env.j2"
    dest: "{{ infrastructure_dir }}/observability/.env"
    owner: "{{ remote_user }}"
    group: "{{ remote_user }}"
    mode: "0600"

- name: Docker compose up -d (observability)
  command: docker compose up -d --force-recreate
  args:
    chdir: "{{ infrastructure_dir }}/observability"

- name: Ensure backup directories exist
  file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0750"
  loop:
    - "{{ backup_dir | default(remote_dir ~ '/backups') }}"
    - "{{ (backup_dir | default(remote_dir ~ '/backups')) ~ '/postgres' }}"
    - "{{ (backup_dir | default(remote_dir ~ '/backups')) ~ '/postgres/infrastructure' }}"
    - "{{ (backup_dir | default(remote_dir ~ '/backups')) ~ '/postgres/immich' }}"
    - /etc/homelab
  when: backup_enabled | default(false)

- name: Ensure node-exporter textfile collector directory exists
  file:
    path: "{{ node_exporter_textfile_dir | default('/var/lib/node_exporter/textfile_collector') }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: backup_enabled | default(false)

- name: Install database backup script
  template:
    src: "{{ playbook_dir }}/templates/db-backup.sh.j2"
    dest: /usr/local/bin/homelab-db-backup
    owner: root
    group: root
    mode: "0750"
  when: backup_enabled | default(false)

- name: Install restic environment file
  template:
    src: "{{ playbook_dir }}/templates/restic.env.j2"
    dest: /etc/homelab/restic.env
    owner: root
    group: root
    mode: "0600"
  when: (backup_enabled | default(false)) and (backup_offsite_enabled | default(false))

- name: Configure database backup cron
  cron:
    name: "Homelab DB backup"
    user: root
    minute: "{{ backup_cron_minute }}"
    hour: "{{ backup_cron_hour }}"
    job: "/usr/local/bin/homelab-db-backup >> /var/log/homelab-db-backup.log 2>&1"
  when: backup_enabled | default(false)
