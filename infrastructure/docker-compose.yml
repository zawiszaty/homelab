services:
  postgresql:
    env_file:
    - .env
    environment:
      POSTGRES_DB: ${PG_DB:-authentik}
      POSTGRES_PASSWORD: ${PG_PASS:?database password required}
      POSTGRES_USER: ${PG_USER:-authentik}
    healthcheck:
      interval: 30s
      retries: 5
      start_period: 20s
      test:
      - CMD-SHELL
      - pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}
      timeout: 5s
    image: docker.io/library/postgres:16-alpine
    restart: unless-stopped
    volumes:
    - database:/var/lib/postgresql/data
  server:
    command: server
    depends_on:
      postgresql:
        condition: service_healthy
    env_file:
    - .env
    environment:
      AUTHENTIK_POSTGRESQL__HOST: postgresql
      AUTHENTIK_POSTGRESQL__NAME: ${PG_DB:-authentik}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${PG_PASS}
      AUTHENTIK_POSTGRESQL__USER: ${PG_USER:-authentik}
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:?secret key required}
    image: ${AUTHENTIK_IMAGE:-ghcr.io/goauthentik/server}:${AUTHENTIK_TAG:-2026.2.0}
    shm_size: 512mb
    ports:
    - ${COMPOSE_PORT_HTTP:-9000}:9000
    - ${COMPOSE_PORT_HTTPS:-9443}:9443
    restart: unless-stopped
    volumes:
    - ./authentik/data:/data
    - ./authentik/custom-templates:/templates
  worker:
    command: worker
    depends_on:
      postgresql:
        condition: service_healthy
    env_file:
    - .env
    environment:
      AUTHENTIK_POSTGRESQL__HOST: postgresql
      AUTHENTIK_POSTGRESQL__NAME: ${PG_DB:-authentik}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${PG_PASS}
      AUTHENTIK_POSTGRESQL__USER: ${PG_USER:-authentik}
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:?secret key required}
    image: ${AUTHENTIK_IMAGE:-ghcr.io/goauthentik/server}:${AUTHENTIK_TAG:-2026.2.0}
    shm_size: 512mb
    restart: unless-stopped
    user: root
    volumes:
    - /var/run/docker.sock:/var/run/docker.sock
    - ./authentik/data:/data
    - ./authentik/certs:/certs
    - ./authentik/custom-templates:/templates
  nginx_proxy:
    image: 'jc21/nginx-proxy-manager:2.14.0'
    restart: unless-stopped
    environment:
      TZ: "Europe/Warsaw"
    ports:
      - '80:80'
      - '81:81'
      - '443:443'
    volumes:
      - ./infrastructure/nginx_proxydata/data:/data
      - ./infrastructure/nginx_proxydata/letsencrypt:/etc/letsencrypt
  n8n:
    image: docker.n8n.io/n8nio/n8n:2.12.3
    env_file:
      - .env
    environment:
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL:-}
      GENERIC_TIMEZONE: ${N8N_TIMEZONE:-Europe/Warsaw}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?n8n encryption key required}
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE:-true}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:?n8n basic auth password required}
      N8N_SECURE_COOKIE: ${N8N_SECURE_COOKIE:-false}
    ports:
      - "5678:5678"
    volumes:
      - ./n8n/data:/home/node/.n8n
    restart: unless-stopped
volumes:
  database:
    driver: local
