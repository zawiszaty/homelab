apiVersion: 1

groups:
  - orgId: 1
    name: homelab-health
    folder: Provisioned
    interval: 1m
    rules:
      - uid: homelab-host-down
        title: Host down
        condition: B
        noDataState: KeepLast
        execErrState: KeepLast
        for: 2m
        annotations:
          summary: "Prometheus target is down"
          description: "Target {{ $labels.instance }} has been down for more than 2 minutes."
        labels:
          severity: critical
          service: host
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              datasource:
                type: prometheus
                uid: PBFA97CFB590B2093
              editorMode: code
              expr: up == 0
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: "__expr__"
            model:
              conditions:
                - evaluator:
                    params:
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: "__expr__"
                uid: "__expr__"
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: threshold

      - uid: homelab-rootfs-high
        title: Root filesystem usage high
        condition: B
        noDataState: KeepLast
        execErrState: KeepLast
        for: 15m
        annotations:
          summary: "Root filesystem usage is high"
          description: "Root filesystem usage on {{ $labels.instance }} is above 85%."
        labels:
          severity: warning
          service: host
        data:
          - refId: A
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              datasource:
                type: prometheus
                uid: PBFA97CFB590B2093
              editorMode: code
              expr: |
                100 - (
                  node_filesystem_avail_bytes{mountpoint="/",fstype!~"tmpfs|overlay"}
                  * 100
                  / node_filesystem_size_bytes{mountpoint="/",fstype!~"tmpfs|overlay"}
                )
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: "__expr__"
            model:
              conditions:
                - evaluator:
                    params:
                      - 85
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: "__expr__"
                uid: "__expr__"
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: threshold

      - uid: homelab-memory-high
        title: Memory usage high
        condition: B
        noDataState: KeepLast
        execErrState: KeepLast
        for: 15m
        annotations:
          summary: "Memory usage is high"
          description: "Memory usage on {{ $labels.instance }} is above 90%."
        labels:
          severity: warning
          service: host
        data:
          - refId: A
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              datasource:
                type: prometheus
                uid: PBFA97CFB590B2093
              editorMode: code
              expr: 100 * (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes))
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: "__expr__"
            model:
              conditions:
                - evaluator:
                    params:
                      - 90
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: "__expr__"
                uid: "__expr__"
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: threshold

      - uid: homelab-backup-failed
        title: Backup failed
        condition: B
        noDataState: KeepLast
        execErrState: KeepLast
        for: 10m
        annotations:
          summary: "Database backup failed"
          description: "The latest homelab backup run did not complete successfully on {{ $labels.instance }}."
        labels:
          severity: critical
          service: backup
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              datasource:
                type: prometheus
                uid: PBFA97CFB590B2093
              editorMode: code
              expr: homelab_backup_status != 1
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: "__expr__"
            model:
              conditions:
                - evaluator:
                    params:
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: "__expr__"
                uid: "__expr__"
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: threshold

      - uid: homelab-backup-stale
        title: Backup stale
        condition: B
        noDataState: KeepLast
        execErrState: KeepLast
        for: 30m
        annotations:
          summary: "Database backup is stale"
          description: "No successful homelab backup has been recorded on {{ $labels.instance }} for more than 36 hours."
        labels:
          severity: warning
          service: backup
        data:
          - refId: A
            relativeTimeRange:
              from: 21600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              datasource:
                type: prometheus
                uid: PBFA97CFB590B2093
              editorMode: code
              expr: time() - homelab_backup_last_success_timestamp_seconds
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: "__expr__"
            model:
              conditions:
                - evaluator:
                    params:
                      - 129600
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: "__expr__"
                uid: "__expr__"
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: threshold

      - uid: homelab-docker-error-spike
        title: Docker error spike
        condition: B
        noDataState: KeepLast
        execErrState: KeepLast
        for: 10m
        annotations:
          summary: "Docker logs contain elevated error volume"
          description: "Container {{ $labels.container }} emitted more than 20 matching error lines in the last 5 minutes."
        labels:
          severity: warning
          service: logs
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: P8E80F9AEF21F6940
            model:
              datasource:
                type: loki
                uid: P8E80F9AEF21F6940
              editorMode: code
              expr: sum by (container) (count_over_time({job="docker"} |= "error" [5m]))
              intervalMs: 1000
              maxDataPoints: 43200
              queryType: instant
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: "__expr__"
            model:
              conditions:
                - evaluator:
                    params:
                      - 20
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: "__expr__"
                uid: "__expr__"
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: threshold
